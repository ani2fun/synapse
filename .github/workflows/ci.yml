name: ci

on:
  push:
    branches: [main]
    tags: ["step-*"]
  pull_request:

jobs:
  # ── The convention gate runs FIRST — it needs nothing but grep/find/wc, so a
  # ── purity or file-cap breach fails in seconds, before any toolchain install.
  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: dev-tools/check-conventions.sh

  build-test:
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (the anti-pattern gate — warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: tests (unit + integration + contract lock)
        run: cargo test --workspace

  client-build:
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.126
      - name: wasm-opt (binaryen)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq binaryen
      - name: npm ci
        working-directory: client
        run: npm ci
      - name: vitest (the TS-island suites)
        working-directory: client
        run: npm test
      - name: wasm + vite production build
        working-directory: client
        run: npm run build
      - name: bundle budget (700 KiB gz critical path)
        run: dev-tools/check-bundle-budget.sh

  # The image must always BUILD (the budget gate runs inside it); pushing is main-only.
  docker:
    needs: [conventions, build-test, client-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: docker smoke build
        run: docker buildx build --file Dockerfile --tag synapse-rs:ci .
