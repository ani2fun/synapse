name: ci

on:
  push:
    branches: [main]
    tags: ["step-*"]
  pull_request:

jobs:
  # ── The convention gate runs FIRST — it needs nothing but grep/find/wc, so a
  # ── purity or file-cap breach fails in seconds, before any toolchain install.
  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: dev-tools/check-conventions.sh

  build-test:
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (the anti-pattern gate — warnings are errors)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: tests (unit + integration + contract lock)
        run: cargo test --workspace

  client-build:
    needs: conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: npm ci
        working-directory: client
        run: npm ci
      - name: wasm + vite production build
        working-directory: client
        run: npm run build
      - name: bundle budget (700 KiB gz critical path)
        run: dev-tools/check-bundle-budget.sh
